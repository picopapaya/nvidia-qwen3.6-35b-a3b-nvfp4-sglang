# NVIDIA Qwen3.6-35B-A3B (NVFP4 pre-quantized, ModelOpt) on GB10 / DGX Spark via SGLang.
#   docker compose up          (HF_TOKEN optional — model is not gated)
services:
  nvidia-qwen3.6-35b-a3b-nvfp4-sglang:
    image: picopapaya/nvidia-qwen3.6-35b-a3b-nvfp4-sglang:latest
    container_name: nvidia-qwen3.6-35b-a3b-nvfp4-sglang
    restart: unless-stopped
    ipc: host               # SGLang needs a large shared-memory segment.
    shm_size: "32gb"
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"   # optional — avoids anonymous download rate limits
      MODEL_ID: "nvidia/Qwen3.6-35B-A3B-NVFP4"
      QUANTIZATION: "auto"   # ModelOpt mixed-precision checkpoint; let SGLang auto-detect (modelopt_mixed)
      KV_CACHE_DTYPE: "auto"
      CONTEXT_LEN: "${CONTEXT_LEN:-262144}"
      MEM_FRACTION: "${MEM_FRACTION:-0.85}"
      MAX_RUNNING_REQUESTS: "4"
      ATTENTION_BACKEND: "${ATTENTION_BACKEND:-triton}"
      EXTRA_ARGS: "${EXTRA_ARGS:-}"
    volumes:
      - hf-cache:/root/.cache/huggingface
    networks:
      - llm-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:

networks:
  llm-net:
    external: true
    name: llm-net
